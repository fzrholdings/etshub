<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETS Ceylon FM Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hub">
        <div class="site-header" ondblclick="promptAdminPassword()">
    <span class="header-etscfm">ETSCFM</span>
    <span class="header-community">COMMUNITY HUB</span>
</div>
        <!-- Tab Navigation -->
         <!-- <div class="tab-bar">
            <!-- <button class="tab-btn active" onclick="switchTab('wall')">📝 Wall</button>
            <!-- <button class="tab-btn" onclick="switchTab('convoys')">🚚 Convoys</button> -->
         <!-- </div>

        <!-- Wall Content -->
        <div style="text-align:right; font-size:12px; color:#aaa; margin-bottom: 6px;">
  🟢 <span id="onlineCount">0</span> online
</div>
        <div id="wallContainer">
            <!-- Search Bar -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 Search posts..." oninput="filterPosts()">
            </div>

            <!-- Post Box -->
            <div class="post-box">
                <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                <div class="attach-section">
                    <button type="button" class="attach-btn" onclick="document.getElementById('imageInput').click()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        Attach
                    </button>
                    <span class="attach-limit">Max 3 images, each &lt;10MB</span>
                    <input type="file" id="imageInput" accept="image/*" multiple style="display:none;" onchange="handleFileSelect(this.files)">
                </div>
                <div class="preview-container" id="previewContainer"></div>
                <button id="postButton" onclick="createPost()">Post</button>
            </div>

            <!-- Posts Feed -->
            <div id="postsContainer"></div>
        </div>

        <!-- Convoys Content -->
        <div id="convoysContainer" style="display:none;">
            <!-- Convoy Search (moved inside) -->
            <div class="convoy-search">
    <input type="text" id="convoySearch" placeholder="🔍 Search convoys..." oninput="filterConvoys()">
</div>

            <!-- Create Convoy Card -->
            <div class="card convoy-create">
                <h3>📋 Create Convoy</h3>
                <div class="form-row">
                    <input type="text" id="convoyTitle" placeholder="Title (e.g. Colombo-Kandy Run)">
                    <select id="convoyServer">
                        <option value="">-- Server --</option>
                        <option value="Simulation 1">Simulation 1</option>
                        <option value="Arcade 1">Arcade 1</option>
                        <option value="Event Server">Event Server</option>
                    </select>
                </div>
                <input type="text" id="convoyMeeting" placeholder="Meeting Location (e.g. EuroPort Rotterdam)">
                <div class="form-row">
                    <input type="datetime-local" id="convoyDateTime">
                    <input type="number" id="convoyMaxSlots" placeholder="Max Slots (e.g. 8)" min="2" max="100">
                </div>
                <textarea id="convoyDesc" placeholder="Description, rules, route info..."></textarea>
                
                <!-- DLC Checkboxes -->
                <div class="dlc-checkboxes">
                    <label class="dlc-label"><input type="checkbox" value="Going East"> Going East</label>
                    <label class="dlc-label"><input type="checkbox" value="Scandinavia"> Scandinavia</label>
                    <label class="dlc-label"><input type="checkbox" value="Vive la France"> Vive la France</label>
                    <label class="dlc-label"><input type="checkbox" value="Italia"> Italia</label>
                    <label class="dlc-label"><input type="checkbox" value="Beyond the Baltic Sea"> Beyond the Baltic Sea</label>
                    <label class="dlc-label"><input type="checkbox" value="Road to the Black Sea"> Road to the Black Sea</label>
                    <label class="dlc-label"><input type="checkbox" value="Iberia"> Iberia</label>
                    <label class="dlc-label"><input type="checkbox" value="Heart of Russia"> Heart of Russia</label>
                </div>
                
                <!-- Tags -->
                <input type="text" id="convoyTags" placeholder="Tags (comma separated, e.g. Heavy Cargo, Casual)">
                
                <!-- Route Map Image -->
               <div class="attach-section">
    <button type="button" class="attach-btn" onclick="document.getElementById('convoyImageInput').click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        Attach Route Image
    </button>
    <span class="attach-limit">Max 1 image, &lt;10MB</span>
    <input type="file" id="convoyImageInput" accept="image/*" style="display:none;">
</div>
                <select id="convoyRecurring">
  <option value="none">No Repeat</option>
  <option value="weekly">Weekly</option>
</select>
                
                <!-- Convoy Type -->
                <select id="convoyType">
                    <option value="public">Public</option>
                    <option value="vtc">VTC Only</option>
                    <option value="invite">Invite Only</option>
                </select>
                
                <button onclick="createConvoy()">🚀 Schedule Convoy</button>
            </div>

            <button onclick="toggleConvoyView()" id="calendarToggle" class="convoy-toggle-btn">📅 Calendar View</button>
<div id="convoysCalendar" style="display:none;"></div>

            <!-- Convoys List -->
            <div id="convoysList"></div>
        </div>
    </div>
    <!-- Admin Panel -->
<div id="adminPanel" style="display:none; background:#0a0a0a; border:1px solid #2a2a2a; border-radius:12px; padding:16px; margin-top:20px;">
    <h3 style="color:#fff; margin-bottom:12px;">🛡️ Admin Panel</h3>
    <button onclick="loadReportedPosts()" class="admin-btn">📋 Show Reported Posts</button>
    <div id="reportedPostsList" style="margin-top:10px;"></div>
    <hr style="border-color:#2a2a2a; margin:12px 0;">
    <button onclick="logoutAdmin()" class="admin-btn" style="background:#e94560; color:#fff;">🔒 Logout Admin</button>
</div>

    <!-- Modals -->
    <div id="confirmModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <p id="confirmMessage"></p>
            <div class="modal-actions">
                <button class="modal-btn cancel-btn" id="confirmCancel">Cancel</button>
                <button class="modal-btn confirm-btn" id="confirmOk">Delete</button>
            </div>
        </div>
    </div>
    <div id="lightbox" class="lightbox-overlay" style="display:none;">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <button class="lightbox-prev" onclick="changeLightboxImage(-1)">&#10094;</button>
        <button class="lightbox-next" onclick="changeLightboxImage(1)">&#10095;</button>
        <div class="lightbox-img-container"><img id="lightboxImg" src="" alt="Preview"></div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
