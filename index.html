<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETS Ceylon FM Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hub">
        <!-- Post Box -->
        <div class="post-box">
            <input type="text" id="nickname" placeholder="Nickname (optional)" maxlength="20">
            <textarea id="postContent" placeholder="මොනවද කියන්න ඕනේ? (Screenshot link, සින්දු request, chat...)"></textarea>
            <input type="file" id="imageInput" accept="image/*">
            <button onclick="createPost()">Post කරන්න</button>
        </div>
        <!-- Posts Feed -->
        <div id="postsContainer"></div>
    </div>

    <!-- Firebase Compat SDKs (non-module, simple) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
